<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | VoxDoc</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f111a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 1.75rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
        color: #f1f5f9;
      }
      p {
        font-size: 0.875rem;
        color: #94a3b8;
        margin: 0.5rem 0;
        line-height: 1.5;
      }
      .badge {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.1);
        color: #f59e0b;
        font-size: 0.75rem;
        font-weight: 500;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.5rem 1.25rem;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">Offline</span>
      <h1>You're offline</h1>
      <p>VoxDoc can't reach the documentation server right now.</p>
      <p>
        For PHI safety, live transcription, SOAP generation, and FHIR push are
        only available when connected. Cached UI shells will load, but no new
        clinical work can be saved until you're back online.
      </p>
      <button type="button" onclick="window.location.reload()">Retry connection</button>
    </div>
  </body>
</html>
