{{- if .Values.asr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-asr
  labels:
    app.kubernetes.io/name: voice-triage-asr
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: asr
spec:
  replicas: {{ .Values.asr.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-triage-asr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-triage-asr
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.asr.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: asr
          image: "{{ .Values.asr.image.repository }}:{{ .Values.asr.image.tag }}"
          ports:
            - containerPort: {{ .Values.asr.service.port }}
              name: grpc
          env:
            {{- range $key, $value := .Values.asr.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources: {{ toYaml .Values.asr.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-asr
spec:
  type: {{ .Values.asr.service.type }}
  ports:
    - port: {{ .Values.asr.service.port }}
      targetPort: grpc
      name: grpc
  selector:
    app.kubernetes.io/name: voice-triage-asr
{{- end }}
---
{{- if .Values.llm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-llm
  labels:
    app.kubernetes.io/name: voice-triage-llm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: llm
spec:
  replicas: {{ .Values.llm.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-triage-llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-triage-llm
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.llm.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: llm
          image: "{{ .Values.llm.image.repository }}:{{ .Values.llm.image.tag }}"
          ports:
            - containerPort: {{ .Values.llm.service.port }}
              name: grpc
          env:
            {{- range $key, $value := .Values.llm.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voice-triage-secrets
                  key: HF_TOKEN
          resources: {{ toYaml .Values.llm.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-llm
spec:
  type: {{ .Values.llm.service.type }}
  ports:
    - port: {{ .Values.llm.service.port }}
      targetPort: grpc
      name: grpc
  selector:
    app.kubernetes.io/name: voice-triage-llm
{{- end }}
---
