        app.kubernetes.io/name: voice-triage-ner
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ner
          image: "{{ .Values.ner.image.repository }}:{{ .Values.ner.image.tag }}"
          ports:
            - containerPort: {{ .Values.ner.service.port }}
              name: grpc
          env:
            {{- range $key, $value := .Values.ner.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources: {{ toYaml .Values.ner.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ner
spec:
  type: {{ .Values.ner.service.type }}
  ports:
    - port: {{ .Values.ner.service.port }}
      targetPort: grpc
      name: grpc
  selector:
    app.kubernetes.io/name: voice-triage-ner
{{- end }}
