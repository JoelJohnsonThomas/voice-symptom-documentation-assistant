apiVersion: v2
name: voice-triage
description: Voice Symptom Triage Assistant - AI-powered clinical documentation platform
type: application
version: 1.0.0
appVersion: "4.0.0"
keywords:
  - healthcare
  - ai
  - clinical-documentation
  - soap-notes
  - hipaa
maintainers:
  - name: Voice Triage Team
dependencies:
  - name: postgresql
    version: "~15.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~18.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "~1.1"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
